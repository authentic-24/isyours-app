<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your hiring pipeline</p>

<form class="space-y-sm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-[44px] pr-sm py-xs bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all font-body-md text-body-md" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-[44px] pr-sm py-xs bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary-container text-on-primary font-label-lg text-label-lg py-xs rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all mt-xs" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-md">
<span class="px-sm bg-surface-container-lowest text-outline font-label-md">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-xs border border-outline-variant rounded-lg py-xs font-label-lg text-label-lg hover:bg-surface-container transition-colors">
<img alt="Google logo" class="w-5 h-5" data-alt="clean minimalist google logo icon for single sign on authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuSwEf4t3EpTMG0zzROVXNfZrDIYKE_vRrlUQMp6Kb6A5jmXC4te7AWYVX6LObmwPkci3bIQEY_W6krORpFtO2dKzRdzvlxsiy0r3KJeJFEBnftjX1v2TWXGZLW0oWqeag-SMglq6szdvWWtQML4vG_dgKYb-ANOTWx6VQ2jJCZoUWoeZxu9VZdI15Deik5UjQKw0me49QizmRm4bI5gnuuTpgxAbKZMfxjq8ZEucfzkEEVvdqVSn40xQsS1Ul4mdY_jAHs1dzqXs"/>

<span class="material-symbols-outlined text-on-surface" data-icon="terminal" style="font-variation-settings: 'FILL' 1;">terminal</span>
                        SSO
                    </button>
</div>
</div>

<p class="text-center mt-md font-body-md text-body-md text-on-surface-variant">
                Don't have an account?

</p>
